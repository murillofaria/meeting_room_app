<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="row shadow-lg rounded-4 border-light p-4" style="background-color: #eff6ff">
            <h2 class="fw-bold text-dark mb-3">Sala <i class="bi bi-info-square-fill"></i></h2>

            <form action="{% url 'criar_sala' %}" method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" name="nome" id="nome" placeholder="Digite o título da reunião">
                        </div>
                        <div class="mb-3">
                            <label for="capacidade" class="form-label">Capacidade de pessoas</label>
                            <input type="number" class="form-control" name="capacidade" id="capacidade" placeholder="Digite a cap. de pessoas">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="localizacao" class="form-label">Localização da sala</label>
                            <input type="text" class="form-control" name="localizacao" id="localizacao" placeholder="Digite o local da sala">
                        </div>
                        <div class="mb-3 d-flex flex-column">
                            <label for="ocupada" class="form-label">A sala está ocupada?</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input shadow" type="radio" name="ocupada" id="ocupada_nao" value="0" checked>
                                <label class="form-check-label" for="ocupada_nao">Não</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input shadow" type="radio" name="ocupada" id="ocupada_sim" value="1">
                                <label class="form-check-label" for="ocupada_sim">Sim</label>
                            </div>
                        </div>
                    </div>
                </div>

                {% if messages %}
                    {% for mensagem in messages %}
                            <div class="alert alert-danger text-center" role="alert">
                                {{mensagem}}
                            </div>
                    {% endfor %}
                {% endif %}

                <div class="row mt-4">
                    <div class="col d-flex justify-content-end"> 
                        <a href="{% url 'reunioes' %}" class= "btn btn-danger me-5">
                            <span>Cancelar</span>
                            <i class="bi bi-box-arrow-right"></i>
                        </a>  
                        <button type="submit" class="btn btn-dark px-5">Salvar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
