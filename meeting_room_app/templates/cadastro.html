{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="row w-75 shadow-lg rounded-4 overflow-hidden">
            <div class="col-md-6 bg-warning bg-gradient shadow-sm d-flex flex-column justify-content-center align-items-center text-dark p-4">
                <img src="{% static 'images/cadastro.gif' %}" alt="" class="img-fluid mb-3 w-50 border border-dark-subtle shadow-lg
                border-3 rounded-5">
                <h4 class="fw-bold">Meeting Room App</h4>
            </div> <!--LOGO / LADO ESQUERDO-->

            {%if messages%}
                <div class="col-md-6 p-5">
                    <h3 class="text-center mb-4 fw-semibold text-dark">Crie sua conta</h3>
                    <form action="{% url 'cadastro' %}" method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="nomeCompleto" class="form-label">Nome completo</label>
                            <input type="text" class="form-control" id="nomeCompleto" placeholder="Digite seu nome completo"
                             value="{{ nomeCompleto_form }}" name="nomeCompleto">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail"
                            value="{{ email_form }}" name="email">
                        </div>
                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha"
                            name="senha">
                        </div>
                        <button type="submit" class="btn btn-dark w-100 mb-3">Cadastrar</button>
                    </form>
                    {% for mensagem in messages %}
                        <div class="alert alert-danger text-center" role="alert">
                            {{mensagem}}
                        </div>
                    {% endfor %}
                    <p class="text-center mt-4">
                        Já tem conta? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Faça login aqui ⬅️</a>
                    </p>
                </div>
            {%else%}
                <div class="col-md-6 p-5">
                    <h3 class="text-center mb-4 fw-semibold text-dark">Crie sua conta</h3>
                    <form action="{% url 'cadastro' %}" method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="nomeCompleto" class="form-label">Nome completo</label>
                            <input type="text" class="form-control" id="nomeCompleto" placeholder="Digite seu nome completo"
                            name="nomeCompleto">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail" name="email">
                        </div>
                        <div class="mb-3">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" name="senha">
                        </div>
                        <button type="submit" class="btn btn-dark w-100 mb-3">Cadastrar</button>
                    </form>
                    <p class="text-center mt-4">
                        Já tem conta? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Faça login aqui ⬅️</a>
                    </p>
                </div>
            {%endif%}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
